name: Weekly GC Report

on:
  schedule:
    # Monday 09:00 KST = Sunday 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  gc-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Run GC analysis
        id: gc
        run: |
          node scripts/gc-weekly.js > gc_output.txt 2>&1
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          cat gc_output.txt
          exit 0  # Don't fail the workflow, handle it in the next step

      - name: Generate Issue Body
        id: issue
        if: steps.gc.outputs.exit_code == '0'
        run: |
          REPORT_DATE=$(date -d "9 hours" +%Y-%m-%d)
          REPORT_FILE=".ai/gc-reports/$REPORT_DATE.md"
          if [ -f "$REPORT_FILE" ]; then
            REPORT_CONTENT=$(cat "$REPORT_FILE")
            CHECKBOXES=$(echo "$REPORT_CONTENT" | grep -E "^\s*-\s*\[" | sed 's/- \[/- \[ \] /g' | head -10)
            {
              echo "body<<EOF"
              echo "## 이번 주 청소 검토 항목"
              echo ""
              echo "$CHECKBOXES"
              echo ""
              echo "---"
              echo ""
              echo "### 📋 상세 보고서"
              echo ""
              echo '```markdown'
              echo "$REPORT_CONTENT"
              echo '```'
              echo ""
              echo "### 📝 승인 방법"
              echo ""
              echo "1. 위 항목 중 정리할 것에 \`[x]\` 체크"
              echo "2. \"승인\" 댓글 달기"
              echo "3. T4 가 자동으로 후속 티켓 생성"
              echo ""
              echo "---"
              echo ""
              echo "*Generated by T4 Ops GC Reporter*"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Issue
        if: steps.gc.outputs.exit_code == '0' && steps.issue.outputs.body != ''
        uses: actions/create-issue@v2
        with:
          title: '🧹 주간 GC 리포트 ${{ github.run_number }}'
          body: ${{ steps.issue.outputs.body }}
          labels: gc, needs-review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Report as Artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: gc-report
          path: .ai/gc-reports/
          retention-days: 30
